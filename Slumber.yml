---
# yaml-language-server: $schema=https://raw.githubusercontent.com/LucasPickering/slumber/refs/tags/v4.3.1/schemas/collection.json
name: This is an API for an authentication service using JWT and optional email 2FA.
profiles:
  default:
    name: local
    default: true
    data:
      host: localhost:3000
      url: "http://{{ host }}"
      email: "{{ prompt(message='Enter user email') }}"
      password: "{{ prompt(message='Enter desired password') }}"
      requires2FA: "{{ prompt(message='Requires 2FA?') }}"
      signup_body: |
        {
          "email": "{{ email }}",
          "password": "{{ password }}",
          "requires2FA": {{ requires2FA | json_parse() }}
        }
  signup-201-success:
    name: signup 201
    data:
      host: localhost:3000
      url: "http://{{ host }}"
      signup_body: |
        {
          "email": "test@example.com",
          "password": "notarealpasswordlol",
          "requires2FA": false
        }
  signup-422-no-mail:
    name: signup 422 empty email
    data:
      host: localhost:3000
      url: "http://{{ host }}"
      signup_body: |
        {
          "password": "notarealpasswordlol",
          "requires2FA": false
        }
  signup-400-invalid-mail:
    name: signup 400 no @ in email
    data:
      host: localhost:3000
      url: "http://{{ host }}"
      signup_body: |
        {
          "email": "test_example.com",
          "password": "secret",
          "requires2FA": false
        }
  signup-400-password-not-long-enough:
    name: signup 400 password too short
    data:
      host: localhost:3000
      url: "http://{{ host }}"
      signup_body: |
        {
          "email": "test_example.com",
          "password": "secret",
          "requires2FA": false
        }

requests:
  web:
    # This route serves the login/signup UI
    name: "Login/Sign-up UI"
    requests:
      ui:
        method: GET
        url: "{{ url }}/"
  registration:
    name: "Register a new user"
    requests:
      # Register a new user
      signup:
        method: POST
        url: "{{ url }}/signup"
        body:
          type: json
          data: "{{ signup_body | json_parse() }}"
        #   "201": "User created successfully!"
        #   "400": "Invalid input"
        #   "401": "Authentication failed"
        #   "409": "Email already exists"
        #   "422": "Unprocessable content"
        #   "500": "Unexpected error"
  authentication:
    name: "Authenticate user and return JWT"
    requests:
      login:
        # Authenticate user and return JWT
        method: POST
        url: "{{ url }}/login"
        #   "200": "Login successful"
        #   "206": "Login requires 2FA"
        #   "400": "Invalid input"
        #   "401": "Authentication failed"
        #   "422": "Unprocessable content"
        #   "500": "Unexpected error"
      verify-2fa:
        # Verify 2FA token
        method: POST
        url: "{{ url }}/verify-2fa"
        #   "200": "Login successful"
        #   "400": "Invalid input"
        #   "401": "Authentication failed"
        #   "422": "Unprocessable content"
        #   "500": "Unexpected error"
      verify-token:
        # Verifies if a JWT is valid
        method: POST
        url: "{{ url }}/verify-token"
        #   "200": "Token is valid"
        #   "401": "JWT is not valid"
        #   "422": "Unprocessable content"
        #   "500": "Unexpected error"
      logout:
        # Logout user
        method: POST
        url: "{{ url }}/logout"
        #   "200": "Logout successful"
        #   "400": "Invalid input"
        #   "401": "JWT is not valid"
        #   "500": "Unexpected error"
